<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>sou.y</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Syne:wght@700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background: #000;
    cursor: default;
  }

  /* ── VIDEO BG ── */
  #bg-video {
    position: fixed;
    inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    z-index: 0;
    filter: grayscale(1) brightness(0.45);
  }

  /* ── OVERLAY VIGNETTE ── */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.65) 100%);
    z-index: 1;
    pointer-events: none;
  }

  /* ── CLICK-TO-ENTER SCREEN ── */
  #enter-screen {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    cursor: pointer;
    transition: opacity 0.6s ease;
  }
  #enter-screen span {
    color: rgba(255,255,255,0.5);
    font-size: 13px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    animation: pulse 2s ease-in-out infinite;
  }
  #enter-screen .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: rgba(255,255,255,0.4);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }
  #enter-screen.hidden { opacity: 0; pointer-events: none; }

  /* ── MAIN CARD ── */
  #card {
    position: relative;
    z-index: 10;
    background: rgba(18, 18, 18, 0.72);
    backdrop-filter: blur(20px) saturate(1.4);
    -webkit-backdrop-filter: blur(20px) saturate(1.4);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 36px 40px 28px;
    width: min(420px, 92vw);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    opacity: 0;
    transform: translateY(18px) scale(0.97);
    transition: opacity 0.7s ease, transform 0.7s ease;
  }
  #card.visible {
    opacity: 1;
    transform: translateY(0) scale(1);
  }

  /* avatar */
  .avatar-wrap {
    position: relative;
    margin-bottom: 14px;
  }
  .avatar-wrap img {
    width: 88px; height: 88px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid rgba(255,255,255,0.15);
    display: block;
  }
  .status-dot {
    position: absolute;
    bottom: 3px; right: 3px;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: #3be37e;
    border: 2px solid rgba(18,18,18,0.9);
  }

  /* name & bio */
  .username {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    color: #fff;
    letter-spacing: -0.02em;
    margin-bottom: 6px;
  }
  .bio {
    font-size: 13px;
    color: rgba(255,255,255,0.45);
    text-align: center;
    line-height: 1.5;
    margin-bottom: 20px;
  }

  /* social icons */
  .socials {
    display: flex;
    gap: 14px;
    margin-bottom: 20px;
  }
  .socials a {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 38px; height: 38px;
    border-radius: 10px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.1);
    text-decoration: none;
    transition: background 0.2s, transform 0.2s;
  }
  .socials a:hover {
    background: rgba(255,255,255,0.15);
    transform: translateY(-2px);
  }
  .socials svg { width: 18px; height: 18px; fill: rgba(255,255,255,0.8); }

  /* views */
  .views {
    font-size: 12px;
    color: rgba(255,255,255,0.28);
    letter-spacing: 0.05em;
    margin-bottom: 0;
  }

  /* ── MUSIC PLAYER ── */
  #player {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    width: min(420px, 92vw);
    background: rgba(18,18,18,0.82);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    opacity: 0;
    transform: translateX(-50%) translateY(10px);
    transition: opacity 0.7s ease 0.3s, transform 0.7s ease 0.3s;
  }
  #player.visible {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  .player-top {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .album-art {
    width: 42px; height: 42px;
    border-radius: 8px;
    object-fit: cover;
    flex-shrink: 0;
    background: rgba(255,255,255,0.1);
  }
  .track-info { flex: 1; min-width: 0; }
  .track-title {
    font-size: 13px;
    font-weight: 500;
    color: #fff;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .track-artist {
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    margin-top: 2px;
  }
  .player-controls {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .ctrl-btn {
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px;
    color: rgba(255,255,255,0.6);
    transition: color 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .ctrl-btn:hover { color: #fff; }
  .ctrl-btn svg { width: 16px; height: 16px; fill: currentColor; }
  .play-btn svg { width: 20px; height: 20px; }

  .progress-wrap { display: flex; align-items: center; gap: 8px; }
  .time-label { font-size: 10px; color: rgba(255,255,255,0.3); min-width: 28px; }
  .time-label.right { text-align: right; }
  input[type=range]#progress {
    flex: 1;
    -webkit-appearance: none;
    height: 3px;
    border-radius: 2px;
    background: rgba(255,255,255,0.15);
    outline: none;
    cursor: pointer;
  }
  input[type=range]#progress::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #fff;
    cursor: pointer;
  }
</style>
</head>
<body>

<!-- VIDEO BACKGROUND -->
<!-- ✏️  Replace "background.mp4" with the path to your video file -->
<video id="bg-video" src="background.mp4" autoplay muted loop playsinline></video>

<!-- CLICK TO ENTER -->
<div id="enter-screen">
  <div class="dot"></div>
  <span>click to enter</span>
</div>

<!-- PROFILE CARD -->
<div id="card">
  <div class="avatar-wrap">
    <!-- ✏️  Replace "avatar.jpg" with your profile photo -->
    <img src="avatar.jpg" alt="sou.y" id="avatar-img" onerror="this.src='data:image/svg+xml,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'88\' height=\'88\'><rect width=\'88\' height=\'88\' rx=\'44\' fill=\'%23333\'/><text x=\'44\' y=\'52\' text-anchor=\'middle\' fill=\'%23aaa\' font-size=\'28\' font-family=\'sans-serif\'>S</text></svg>'">
    <div class="status-dot"></div>
  </div>

  <div class="username">sou.y</div>
  <div class="bio">Still coding myself into greatness.</div>

  <!-- SOCIAL LINKS — update the href values -->
  <div class="socials">
    <!-- Discord -->
    <a href="#" title="Discord">

    <a href="#" title="TikTok">
      <svg viewBox="0 0 24 24"><path d="M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.05-2.89-.35-4.2-.97-.57-.26-1.1-.59-1.62-.93-.01 2.92.01 5.84-.02 8.75-.08 1.4-.54 2.79-1.35 3.94-1.31 1.92-3.58 3.17-5.91 3.21-1.43.08-2.86-.31-4.08-1.03-2.02-1.19-3.44-3.37-3.65-5.71-.02-.5-.03-1-.01-1.49.18-1.9 1.12-3.72 2.58-4.96 1.66-1.44 3.98-2.13 6.15-1.72.02 1.48-.04 2.96-.04 4.44-.99-.32-2.15-.23-3.02.37-.63.41-1.11 1.04-1.36 1.75-.21.51-.15 1.07-.14 1.61.24 1.64 1.82 3.02 3.5 2.87 1.12-.01 2.19-.66 2.77-1.61.19-.33.4-.67.41-1.06.1-1.79.06-3.57.07-5.36.01-4.03-.01-8.05.02-12.07z"/></svg>
    </a>
    <!-- Instagram -->
    <a href="#" title="Instagram">
      <svg viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zM12 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z"/></svg>

    </a>
  </div>

  <div class="views">👁 3 profile views</div>
</div>

<!-- MUSIC PLAYER -->
<div id="player">
  <div class="player-top">
    <!-- ✏️  Replace "album.jpg" with your album art image -->
    <img class="album-art" src="album.jpg" alt="album art" id="album-art" onerror="this.style.background='#333'">
    <div class="track-info">
      <!-- ✏️  Update track title and artist -->
      <div class="track-title" id="track-title">Pop Smoke – For The Night</div>
      <div class="track-artist" id="track-artist">Pop Smoke</div>
    </div>
    <div class="player-controls">
      <button class="ctrl-btn" id="btn-prev" title="Previous">
        <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
      </button>
      <button class="ctrl-btn play-btn" id="btn-play" title="Play/Pause">
        <svg viewBox="0 0 24 24" id="play-icon"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <button class="ctrl-btn" id="btn-next" title="Next">
        <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zm2-8.14L11.03 12 8 14.14V9.86zM16 6h2v12h-2z"/></svg>
      </button>
    </div>
  </div>
  <div class="progress-wrap">
    <span class="time-label" id="time-cur">0:00</span>
    <input type="range" id="progress" min="0" max="100" value="0">
    <span class="time-label right" id="time-dur">0:00</span>
  </div>
</div>

<!-- HIDDEN AUDIO ELEMENT -->
<!-- ✏️  Replace "music.mp3" with your audio file -->
<audio id="audio" src="music.mp3" preload="metadata"></audio>

<script>
  const enterScreen = document.getElementById('enter-screen');
  const card = document.getElementById('card');
  const player = document.getElementById('player');
  const audio = document.getElementById('audio');
  const btnPlay = document.getElementById('btn-play');
  const playIcon = document.getElementById('play-icon');
  const progressBar = document.getElementById('progress');
  const timeCur = document.getElementById('time-cur');
  const timeDur = document.getElementById('time-dur');

  let entered = false;

  enterScreen.addEventListener('click', () => {
    if (entered) return;
    entered = true;
    enterScreen.classList.add('hidden');
    setTimeout(() => {
      card.classList.add('visible');
      player.classList.add('visible');
    }, 400);
    audio.play().catch(() => {});
  });

  // Play/Pause
  const pauseSVG = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
  const playSVG = '<path d="M8 5v14l11-7z"/>';

  btnPlay.addEventListener('click', () => {
    if (audio.paused) {
      audio.play();
      playIcon.innerHTML = pauseSVG;
    } else {
      audio.pause();
      playIcon.innerHTML = playSVG;
    }
  });

  audio.addEventListener('play', () => { playIcon.innerHTML = pauseSVG; });
  audio.addEventListener('pause', () => { playIcon.innerHTML = playSVG; });

  // Progress
  function fmt(s) {
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return m + ':' + String(sec).padStart(2, '0');
  }

  audio.addEventListener('loadedmetadata', () => {
    timeDur.textContent = fmt(audio.duration);
  });

  audio.addEventListener('timeupdate', () => {
    if (!audio.duration) return;
    const pct = (audio.currentTime / audio.duration) * 100;
    progressBar.value = pct;
    timeCur.textContent = fmt(audio.currentTime);
    progressBar.style.background =
      `linear-gradient(to right, rgba(255,255,255,0.8) ${pct}%, rgba(255,255,255,0.15) ${pct}%)`;
  });

  progressBar.addEventListener('input', () => {
    if (!audio.duration) return;
    audio.currentTime = (progressBar.value / 100) * audio.duration;
  });

  // Prev / Next (single track, just restart)
  document.getElementById('btn-prev').addEventListener('click', () => {
    audio.currentTime = 0;
  });
  document.getElementById('btn-next').addEventListener('click', () => {
    audio.currentTime = 0;
    audio.play();
  });
</script>
</body>
</html>
